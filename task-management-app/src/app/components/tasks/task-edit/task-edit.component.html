<div class="container mx-auto px-4 py-8 max-w-3xl">
  <!-- Back Link -->
  <div class="mb-6">
    <a [routerLink]="['/tasks', taskId]" class="inline-flex items-center text-blue-600 hover:text-blue-800 font-medium transition-colors">
      <i class="fas fa-arrow-left mr-2"></i> Back to Task
    </a>
  </div>

  <!-- Form Card -->
  <div class="bg-white rounded-3xl shadow-xl overflow-hidden">
    <!-- Header -->
    <div class="bg-gradient-to-r from-yellow-500 to-yellow-600 p-8">
      <h2 class="text-3xl font-bold text-white flex items-center">
        <i class="fas fa-edit mr-3"></i> Edit Task
      </h2>
      <p class="text-yellow-100 mt-2 text-sm">Update task details</p>
    </div>

    <!-- Form Body -->
    <div class="p-8 space-y-6">

      <!-- Loading State -->
      <div *ngIf="loading" class="flex items-center justify-center p-12">
        <div class="flex flex-col items-center">
          <div class="w-16 h-16 border-4 border-yellow-500 border-t-transparent rounded-full animate-spin"></div>
          <p class="mt-4 text-gray-600">Loading task details...</p>
        </div>
      </div>

      <!-- Error State -->
      <div *ngIf="!loading && error" class="bg-red-50 border-l-4 border-red-500 text-red-700 p-4 rounded-lg shadow-sm flex items-start">
        <i class="fas fa-exclamation-circle mt-1 mr-3 text-lg"></i>
        <div>
          <p class="font-semibold">Error</p>
          <p class="text-sm">{{ error }}</p>
          <button class="text-sm underline mt-2" [routerLink]="['/tasks']">Return to tasks</button>
        </div>
      </div>

      <!-- Form -->
      <form *ngIf="!loading && !error" [formGroup]="taskForm" (ngSubmit)="updateTask()" class="space-y-6">

        <!-- Title -->
        <div>
          <input 
            type="text"
            id="title"
            formControlName="title"
            placeholder="Task Title *"
            class="w-full px-4 py-3 border border-gray-300 rounded-xl shadow-sm focus:outline-none focus:ring-2 focus:ring-yellow-500 focus:border-yellow-500"
          >
          <div *ngIf="taskForm.get('title')?.invalid && (taskForm.get('title')?.touched || taskForm.get('title')?.dirty)" class="mt-1 text-sm text-red-600 space-y-1">
            <p *ngIf="taskForm.get('title')?.errors?.['required']"><i class="fas fa-info-circle mr-1"></i>Title is required</p>
            <p *ngIf="taskForm.get('title')?.errors?.['minlength']"><i class="fas fa-info-circle mr-1"></i>Title must be at least 3 characters</p>
          </div>
        </div>

        <!-- Description -->
        <div>
          <textarea
            id="description"
            formControlName="description"
            rows="4"
            placeholder="Description *"
            class="w-full px-4 py-3 border border-gray-300 rounded-xl shadow-sm focus:outline-none focus:ring-2 focus:ring-yellow-500 focus:border-yellow-500 resize-none"
          ></textarea>
          <div *ngIf="taskForm.get('description')?.invalid && (taskForm.get('description')?.touched || taskForm.get('description')?.dirty)" class="mt-1 text-sm text-red-600 space-y-1">
            <p *ngIf="taskForm.get('description')?.errors?.['required']"><i class="fas fa-info-circle mr-1"></i>Description is required</p>
            <p *ngIf="taskForm.get('description')?.errors?.['minlength']"><i class="fas fa-info-circle mr-1"></i>Description must be at least 3 characters</p>
          </div>
        </div>

        <!-- Dates Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">

  <!-- Start Date -->
  <div class="relative">
    <label for="startDate" class="block text-sm font-medium text-gray-700 mb-1">Start Date</label>
    <div class="relative">
      <i class="far fa-calendar-alt absolute left-3 top-3 text-gray-400 pointer-events-none"></i>
      <input
        type="datetime-local"
        id="startDate"
        formControlName="startDate"
        [min]="minDateTime"
        placeholder="Start Date"
        class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-xl shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
        (keydown)="preventTyping($event)"
      >
    </div>
  </div>

  <!-- Deadline -->
  <div class="relative">
    <label for="deadline" class="block text-sm font-medium text-gray-700 mb-1">Deadline <span class="text-red-500">*</span></label>
    <div class="relative">
      <i class="far fa-calendar-alt absolute left-3 top-3 text-gray-400 pointer-events-none"></i>
      <input
        type="datetime-local"
        id="deadline"
        formControlName="deadline"
        [min]="minDateTime"
        placeholder="Deadline"
        class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-xl shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
        (keydown)="preventTyping($event)"
      >
    </div>
    <div class="mt-1 text-sm text-red-600 space-y-1">
      <p *ngIf="taskForm.get('deadline')?.errors?.['required'] && (taskForm.get('deadline')?.touched || taskForm.get('deadline')?.dirty)">
        <i class="fas fa-info-circle mr-1"></i>Deadline is required
      </p>
      <p *ngIf="taskForm.errors?.['deadlineBeforeStart'] && 
                (taskForm.get('deadline')?.touched || taskForm.get('deadline')?.dirty || taskForm.get('startDate')?.touched || taskForm.get('startDate')?.dirty)">
        <i class="fas fa-info-circle mr-1"></i>Deadline must be after start date
      </p>
    </div>
  </div>

</div>

        <!-- Priority -->
        <div class="relative">
          <i class="fas fa-flag absolute left-3 top-3 text-gray-400 pointer-events-none"></i>
          <i class="fas fa-chevron-down absolute right-3 top-3 text-gray-400 pointer-events-none"></i>
          <select
            id="priority"
            formControlName="priority"
            class="w-full pl-10 pr-10 py-3 border border-gray-300 rounded-xl shadow-sm focus:outline-none focus:ring-2 focus:ring-yellow-500 focus:border-yellow-500 appearance-none"
          >
            <option value="" disabled>Select Priority *</option>
            <option value="Low">Low</option>
            <option value="Medium">Medium</option>
            <option value="High">High</option>
          </select>
          <div *ngIf="taskForm.get('priority')?.invalid && (taskForm.get('priority')?.touched || taskForm.get('priority')?.dirty)" class="mt-1 text-sm text-red-600">
            <p *ngIf="taskForm.get('priority')?.errors?.['required']"><i class="fas fa-info-circle mr-1"></i>Priority is required</p>
          </div>
        </div>

        <!-- Submit -->
        <div>
          <button
            type="submit"
            class="w-full flex justify-center items-center px-6 py-3 rounded-xl shadow-md text-white bg-yellow-500 hover:bg-yellow-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-yellow-500 transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
            [disabled]="taskForm.invalid || loading"
          >
            <i class="fas" [ngClass]="{'fa-save': !loading, 'fa-spinner fa-spin': loading}"></i>
            <span class="ml-2">{{ loading ? 'Updating...' : 'Update Task' }}</span>
          </button>
        </div>

      </form>
    </div>
  </div>
</div>
